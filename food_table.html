<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>식단표</title>
<style>
body{font-family:Arial,sans-serif;background:#f3f3f3;margin:20px}
button{cursor:pointer}
#addBtn{width:100%;padding:12px;font-size:24px;background:#ddd;border:1px solid #aaa}
.card{background:#fff;border:2px solid #222;margin:20px 0}
.head{display:flex;align-items:center;padding:8px;border-bottom:2px solid #222}
.head button{font-size:24px;background:none;border:none}
.dateLabel{flex:1;text-align:center;font-size:26px;font-weight:bold}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th,td{border:1px solid #bbb;text-align:center;padding:6px}
th{background:#eee;font-size:18px}
.edit{min-height:28px}
.edit,.amount{outline:none}
.edit[contenteditable],.amount[contenteditable]{display:block}
.hidden{display:none}
</style>
</head>
<body>
<button id="addBtn">식단표 추가</button>
<div id="list"></div>

<script>
let data=JSON.parse(localStorage.getItem("mealCards")||"[]");

function todayISO(){return new Date().toISOString().slice(0,10);}
function fmt(d){
 let dt=new Date(d+"T00:00");
 let w=["일","월","화","수","목","금","토"];
 return (dt.getMonth()+1)+"/"+dt.getDate()+"("+w[dt.getDay()]+")";
}
function save(){
 localStorage.setItem("mealCards",JSON.stringify(data));
}
function sortData(){
 data.sort((a,b)=>a.date.localeCompare(b.date));
}
function blankMeal(){
 return {rows:[
 ["","",""],
 ["","",""],
 ["","",""],
 ["","",""],
 ["","",""]
 ],amount:[" / "," / "," / "]};
}
function addCard(copy=null){
 let obj=copy?JSON.parse(JSON.stringify(copy)):{date:todayISO(),...blankMeal()};
 delete obj.id;
 obj.id=Date.now()+Math.random();
 data.push(obj);
 sortData();save();render();
}
document.getElementById("addBtn").onclick=()=>addCard();

function render(){
 sortData();
 let wrap=document.getElementById("list");
 wrap.innerHTML="";
 data.forEach(card=>{
  let c=document.createElement("div");
  c.className="card";
  c.innerHTML=`
  <div class=head>
    <button class=cal>📅</button>
    <span class=dateLabel>${fmt(card.date)}</span>
    <button class=copy>📋</button>
    <button class=del>❌</button>
    <input class=picker type=date value="${card.date}" style="display:none">
  </div>
  <table>
  <tr><th>아침</th><th>점심</th><th>저녁</th></tr>
  ${[0,1,2,3,4].map(r=>`<tr>${
   [0,1,2].map(m=>`<td><div class="edit" contenteditable data-r="${r}" data-m="${m}">${card.rows[r][m]||""}</div></td>`).join("")
  }</tr>`).join("")}
  <tr>${
   [0,1,2].map(m=>`<td><div class="amount" contenteditable data-a="${m}">${card.amount[m]||""}</div></td>`).join("")
  }</tr>
  </table>`;
  wrap.appendChild(c);
  c.querySelector(".cal").onclick=()=>c.querySelector(".picker").click();
  c.querySelector(".picker").onchange=e=>{card.date=e.target.value;save();render();}
  c.querySelector(".copy").onclick=()=>{
    let cp=JSON.parse(JSON.stringify(card));
    cp.date=todayISO();
    addCard(cp);
  };
  c.querySelector(".del").onclick=()=>{
    if(confirm("삭제하시겠습니까?")){
      data=data.filter(x=>x.id!==card.id);
      save();render();
    }
  };
  c.querySelectorAll(".edit").forEach(el=>{
    el.oninput=()=>{
      card.rows[el.dataset.r][el.dataset.m]=el.innerText.trim();
      save();
    };
  });
  c.querySelectorAll(".amount").forEach(el=>{
    el.oninput=()=>{
      card.amount[el.dataset.a]=el.innerText.trim();
      save();
    };
  });
 });
}
if(data.length===0)addCard(); else render();
</script>
</body>
</html>
