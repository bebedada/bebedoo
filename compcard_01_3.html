<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모바일 컴카드 메이커</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f5f5f5;
}
.header{
padding:16px;
text-align:center;
font-size:24px;
font-weight:700;
background:#fff;
position:sticky;
top:0;
}
.container{
max-width:430px;
margin:0 auto;
padding:12px;
}
.cardbox,.preview{
background:#fff;
border-radius:16px;
padding:16px;
margin-bottom:12px;
}
label{
display:block;
font-size:18px;
font-weight:600;
margin-top:12px;
}
input,select{
width:100%;
padding:16px;
font-size:18px;
margin-top:6px;
border:1px solid #ddd;
border-radius:10px;
}
button{
width:100%;
padding:18px;
font-size:20px;
font-weight:700;
margin-top:12px;
border:none;
border-radius:12px;
}
.primary{background:#111;color:white}

#card{
width:100%;
aspect-ratio:1.6/1;
background:white;
border:1px solid #ddd;
padding:10px;
overflow:hidden;
}

.horizontal{
display:flex;
height:100%;
gap:10px;
}

.left{
width:60%;
display:grid;
grid-template-columns:2fr 1fr;
gap:6px;
}

.right{
width:40%;
display:flex;
flex-direction:column;
justify-content:center;
}

.photo{
background:#ddd;
overflow:hidden;
}

.photo{display:flex;align-items:center;justify-content:center}.photo img{width:100%;height:100%;object-fit:cover;object-position:center;}

.name{
font-size:18px;
font-weight:700;
margin-bottom:8px;
}

.info{
font-size:12px;
line-height:1.5;
}

.ad{
margin-top:auto;
font-size:10px;
color:#777;
padding-top:8px;
}
</style>
</head>
<body>

<div class="header">컴카드 만들기</div>

<div class="container">

<div class="preview">
<div id="card">
<div class="horizontal">

<div class="left">
<div class="photo" style="grid-row:1 / span 2;"><img id="img0"></div><div class="photo"><img id="img1"></div><div class="photo"><img id="img2"></div>
</div>

<div class="right">
<div class="name" id="nameView"></div>

<div class="info">
<div>Height: <span id="heightView">-</span></div>
<div>Shoes: <span id="weightView">-</span></div>
<div>Tel: <span id="phoneView">-</span></div>
</div>

<div class="ad">광고 영역</div>
</div>

</div>
</div>
</div>

<div class="cardbox">
<label>이름</label>
<input id="name">

<label>키(cm)</label>
<input id="height">

<label>신발(mm)</label>
<input id="weight">

<label>연락처</label>
<input id="phone">

<label>사진1</label>
<input type="file" accept="image/*" onchange="loadImage(event,0)">

<label>사진2</label>
<input type="file" accept="image/*" onchange="loadImage(event,1)">

<label>사진3</label>
<input type="file" accept="image/*" onchange="loadImage(event,2)">

<label>사진4</label>
<input type="file" accept="image/*" onchange="loadImage(event,3)">

<div style="display:flex;gap:8px"><button onclick="resetAll()">초기화</button><button class="primary" onclick="downloadCard()">저장</button></div>
</div>

</div>

<script>
["name","height","weight","phone"].forEach(id=>{
 document.getElementById(id).addEventListener("input",saveAll);
});

function saveAll(){
 const nameInput=document.getElementById('name');
 const heightInput=document.getElementById('height');
 const weightInput=document.getElementById('weight');
 const phoneInput=document.getElementById('phone');
 localStorage.setItem("name",nameInput.value);
 localStorage.setItem("height",heightInput.value);
 localStorage.setItem("weight",weightInput.value);
 localStorage.setItem("phone",phoneInput.value);
 document.getElementById('nameView').innerText=nameInput.value||"MODEL";
 document.getElementById('heightView').innerText=heightInput.value||"-";
 document.getElementById('weightView').innerText=weightInput.value||"-";
 document.getElementById('phoneView').innerText=phoneInput.value||"-";
}

function loadImage(e,index){
 const f=e.target.files[0];
 if(!f)return;

 const r=new FileReader();
 r.onload=function(ev){
   document.getElementById("img"+index).src=ev.target.result;
   localStorage.setItem("img"+index,ev.target.result);
 }
 r.readAsDataURL(f);
}

function loadSaved(){
 ["name","height","weight","phone"].forEach(id=>{
   document.getElementById(id).value=localStorage.getItem(id)||"";
 });

 for(let i=0;i<4;i++){
   const img=localStorage.getItem("img"+i);
   if(img) document.getElementById("img"+i).src=img;
 }

 saveAll();
}


function resetAll(){
 if(!confirm('초기화하시겠습니까?')) return;
 ['name','height','weight','phone'].forEach(id=>{localStorage.removeItem(id);document.getElementById(id).value='';});
 for(let i=0;i<4;i++){localStorage.removeItem('img'+i);document.getElementById('img'+i).src='';const f=document.querySelectorAll('input[type=file]'); if(f[i]) f[i].value='';}
 saveAll();
}

function downloadCard(){
 html2canvas(document.getElementById("card"),{scale:3}).then(canvas=>{
   const a=document.createElement("a");
   a.href=canvas.toDataURL("image/jpeg",1);
   a.download="compcard-mobile.jpg";
   a.click();
 });
}

loadSaved();
</script>

</body>
</html>
