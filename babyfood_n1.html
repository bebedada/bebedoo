<!DOCTYPE html><html lang='ko'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>이유식 식단표</title><style>*{box-sizing:border-box}body{margin:0;padding:16px;background:#f4f5f7;font-family:sans-serif}#add{width:100%;padding:14px;border:none;border-radius:12px;background:#4caf50;color:#fff;font-size:18px;font-weight:bold}.card{background:#fff;border:1px solid #e5e5e5;border-radius:16px;margin:18px 0;overflow:hidden}.today{border:2px solid #63c27d}.header{display:flex;gap:8px;align-items:center;padding:10px;background:#fafafa}.title{flex:1;text-align:center;font-weight:bold;font-size:20px}.btn{border:none;background:#eee;padding:8px 12px;border-radius:8px}table{width:100%;border-collapse:collapse;table-layout:fixed}th,td{border:1px solid #eee}th{padding:8px}.cell{min-height:38px;padding:8px;display:flex;justify-content:center;align-items:center;text-align:center;outline:none}.amount td{text-align:center;padding:8px}.amount input{width:42%;padding:2px;text-align:center}</style></head><body><button id='add'>+ 식단표 추가</button><div id='wrap'></div><script>
const KEY='meal_v3';let data=JSON.parse(localStorage.getItem(KEY)||'[]');const W=['일','월','화','수','목','금','토'];const iso=()=>new Date().toISOString().slice(0,10);const fmt=d=>{let x=new Date(d+'T00:00');return`${x.getMonth()+1}/${x.getDate()}(${W[x.getDay()]})`;};const save=()=>localStorage.setItem(KEY,JSON.stringify(data));const blank=d=>({date:d,id:Date.now()+Math.random(),cells:Array(15).fill(''),eat:[['',''],['',''],['','']]});function nextDate(d){let t=new Date(d+'T00:00');do{t.setDate(t.getDate()+1);var s=t.toISOString().slice(0,10)}while(data.some(v=>v.date===s));return s;}function render(){data.sort((a,b)=>a.date.localeCompare(b.date));wrap.innerHTML='';data.forEach(card=>{let rows='';for(let r=0;r<5;r++){rows+='<tr>';for(let c=0;c<3;c++){let i=r*3+c;rows+=`<td><div class="cell" contenteditable data-i="${i}">${card.cells[i]||''}</div></td>`;}rows+='</tr>';}let d=document.createElement('div');d.className='card'+(card.date===iso()?' today':'');d.innerHTML=`<div class="header"><input type=date value="${card.date}"><div class="title">${fmt(card.date)}</div><button class="btn copy">복사</button><button class="btn del">삭제</button></div><table><tr><th>아침</th><th>점심</th><th>저녁</th></tr>${rows}<tr class="amount"><td><input class=eat data-m=0 data-t=0 value="${card.eat[0][0]}"> / <input class=eat data-m=0 data-t=1 value="${card.eat[0][1]}"></td><td><input class=eat data-m=1 data-t=0 value="${card.eat[1][0]}"> / <input class=eat data-m=1 data-t=1 value="${card.eat[1][1]}"></td><td><input class=eat data-m=2 data-t=0 value="${card.eat[2][0]}"> / <input class=eat data-m=2 data-t=1 value="${card.eat[2][1]}"></td></tr></table>`;wrap.appendChild(d);d.querySelectorAll('.cell').forEach((e,i)=>e.oninput=()=>{card.cells[i]=e.innerText;save();});d.querySelectorAll('.eat').forEach(i=>i.oninput=()=>{card.eat[i.dataset.m][i.dataset.t]=i.value;save();});d.querySelector('input[type=date]').onchange=e=>{card.date=e.target.value;save();render();};d.querySelector('.copy').onclick=()=>{let cp=JSON.parse(JSON.stringify(card));cp.id=Date.now()+Math.random();cp.date=nextDate(card.date);data.push(cp);save();render();};d.querySelector('.del').onclick=()=>{if(confirm('삭제하시겠습니까?')){data=data.filter(v=>v.id!==card.id);save();render();}};});}
add.onclick=()=>{data.push(blank(iso()));save();render();};if(!data.length){data=[blank(iso())];save();}render();
</script></body></html>
