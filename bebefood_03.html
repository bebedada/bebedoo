<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>이유식 식단표</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 16px;
      background: #f4f5f7;
      font-family: sans-serif;
    }

    #add {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #4caf50;
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      margin: 18px 0;
      overflow: hidden;
    }

    .today {
      border: 2px solid #63c27d;
    }

    .header {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px;
      background: #fafafa;
    }

    .title {
      flex: 1;
      text-align: center;
      font-weight: bold;
      font-size: 20px;
    }

    .btn {
      border: none;
      background: #eee;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th,
    td {
      border: 1px solid #eee;
    }

    th {
      padding: 8px;
    }

    .cell {
      min-height: 38px;
      padding: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      outline: none;
    }

    .amount td {
      text-align: center;
      padding: 8px;
    }

    .amount input {
      width: 42%;
      padding: 2px;
      text-align: center;
    }
  </style>
</head>
<body>
  <button id="add">+ 식단표 추가</button>
  <div id="wrap"></div>

    <script>
    // 저장 키
    const KEY = 'meal_v3';

    // 카드가 들어갈 영역
    const wrap = document.getElementById('wrap');

    // 로컬스토리지에서 데이터 불러오기
    let data = JSON.parse(localStorage.getItem(KEY) || '[]');

    // 요일 표시
    const WEEK = ['일', '월', '화', '수', '목', '금', '토'];

    // 숫자 2자리 패딩
    const pad = (n) => String(n).padStart(2, '0');

    // 로컬 기준 오늘 날짜를 YYYY-MM-DD 형식으로 반환
    const localIso = (date = new Date()) =>
      `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;

    // 오늘 날짜를 YYYY-MM-DD 형식으로 반환
    const iso = () => localIso();

    // 날짜를 "M/D(요일)" 형태로 표시
    const fmt = (date) => {
      const x = new Date(date + 'T00:00');
      return `${x.getMonth() + 1}/${x.getDate()}(${WEEK[x.getDay()]})`;
    };

    // 현재 데이터를 저장
    const save = () => {
      localStorage.setItem(KEY, JSON.stringify(data));
    };

    // 빈 식단표 생성
    const blank = (date) => ({
      date,
      id: Date.now() + Math.random(),
      cells: Array(15).fill(''),
      eat: [
        ['', ''],
        ['', ''],
        ['', ''],
      ],
    });

    // 같은 날짜가 없도록 다음 날짜 찾기
    function nextDate(date) {
      const t = new Date(date + 'T00:00');

      do {
        t.setDate(t.getDate() + 1);
      } while (data.some((item) => item.date === localIso(t)));

      return localIso(t);
    }

    // 카드 안에서 다음 편집 요소로 이동
    function focusNextField(cardEl, currentEl) {
      const fields = Array.from(
        cardEl.querySelectorAll('.cell, .eat')
      );

      const currentIndex = fields.indexOf(currentEl);
      if (currentIndex === -1) return;

      const nextEl = fields[currentIndex + 1];
      if (!nextEl) return;

      nextEl.focus();

      if (nextEl.tagName === 'INPUT') {
        nextEl.select?.();
      }
    }

    // 화면 렌더링
    function render() {
      data.sort((a, b) => a.date.localeCompare(b.date));
      wrap.innerHTML = '';

      data.forEach((card) => {
        let rows = '';

        // 5행 x 3열 = 15칸
        for (let r = 0; r < 5; r++) {
          rows += '<tr>';

          for (let c = 0; c < 3; c++) {
            const i = r * 3 + c;
            rows += `
              <td>
                <div class="cell" contenteditable="true" data-i="${i}">${card.cells[i] || ''}</div>
              </td>
            `;
          }

          rows += '</tr>';
        }

        const cardEl = document.createElement('div');
        cardEl.className = 'card' + (card.date === iso() ? ' today' : '');

        cardEl.innerHTML = `
          <div class="header">
            <input type="date" value="${card.date}" />
            <div class="title">${fmt(card.date)}</div>
            <button class="btn copy">복사</button>
            <button class="btn del">삭제</button>
          </div>

          <table>
            <tr>
              <th>아침</th>
              <th>점심</th>
              <th>저녁</th>
            </tr>

            ${rows}

            <tr class="amount">
              <td>
                <input type="number" inputmode="numeric" class="eat" data-m="0" data-t="0" value="${card.eat[0][0]}" /> /
                <input type="number" inputmode="numeric" class="eat" data-m="0" data-t="1" value="${card.eat[0][1]}" />
              </td>
              <td>
                <input type="number" inputmode="numeric" class="eat" data-m="1" data-t="0" value="${card.eat[1][0]}" /> /
                <input type="number" inputmode="numeric" class="eat" data-m="1" data-t="1" value="${card.eat[1][1]}" />
              </td>
              <td>
                <input type="number" inputmode="numeric" class="eat" data-m="2" data-t="0" value="${card.eat[2][0]}" /> /
                <input type="number" inputmode="numeric" class="eat" data-m="2" data-t="1" value="${card.eat[2][1]}" />
              </td>
            </tr>
          </table>
        `;

        wrap.appendChild(cardEl);

        // 식단 텍스트 저장 + Enter 시 다음 칸으로 이동
        cardEl.querySelectorAll('.cell').forEach((cell, index) => {
          cell.oninput = () => {
            card.cells[index] = cell.innerText;
            save();
          };

          cell.onkeydown = (e) => {
            if (e.key === 'Enter') {
              e.preventDefault();
              focusNextField(cardEl, cell);
            }
          };
        });

        // 양/개수 입력 저장 + Enter 시 다음 입력으로 이동
        cardEl.querySelectorAll('.eat').forEach((input) => {
          input.oninput = () => {
            card.eat[input.dataset.m][input.dataset.t] = input.value;
            save();
          };

          input.onkeydown = (e) => {
            if (e.key === 'Enter') {
              e.preventDefault();
              focusNextField(cardEl, input);
            }
          };
        });

        // 날짜 변경
        cardEl.querySelector('input[type="date"]').onchange = (e) => {
          card.date = e.target.value;
          save();
          render();
        };

        // 카드 복사
        cardEl.querySelector('.copy').onclick = () => {
          const copied = JSON.parse(JSON.stringify(card));
          copied.id = Date.now() + Math.random();
          copied.date = nextDate(card.date);

          data.push(copied);
          save();
          render();
        };

        // 카드 삭제
        cardEl.querySelector('.del').onclick = () => {
          if (confirm('삭제하시겠습니까?')) {
            data = data.filter((item) => item.id !== card.id);
            save();
            render();
          }
        };
      });
    }

    // 새 식단표 추가
    add.onclick = () => {
      data.push(blank(iso()));
      save();
      render();
    };

    // 최초 1개도 없으면 기본 생성
    if (!data.length) {
      data = [blank(iso())];
      save();
    }

    render();
  </script>

</body>
</html>
