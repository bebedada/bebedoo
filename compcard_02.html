<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Model Comp Card</title>
<style>
body{font-family:Arial,sans-serif;background:#eee;display:flex;justify-content:center;padding:30px}
.card{width:1000px;background:#fff;border:2px solid #bbb;border-radius:30px;padding:45px;display:flex;gap:42px}
.left{width:42%}.main{width:100%;height:590px;background:#ddd;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:22px;font-weight:700;color:#666}
.right{flex:1}.row{margin:6px 0}.row label{display:inline-block;width:110px;color:#555}.row input{border:none;border-bottom:1px solid #ccc;font-size:18px;width:220px}
.name{font-size:46px;font-weight:700;width:100%;border:none}.kname{font-size:28px;font-weight:700;border:none;width:100%;margin-bottom:20px}
.photos{display:flex;gap:26px;margin-top:40px}.sub{width:235px;height:300px;background:#ddd;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#666;font-weight:700}
.sub img,.main img{width:100%;height:100%;object-fit:cover}
</style></head><body>
<div class="card">
<div class="left"><div class="main" onclick="pick('p1')"><span>+ 사진선택</span><img id="i1" hidden></div><input id="p1" type=file accept=image/* hidden onchange="load(this,'i1')"></div>
<div class="right">
<input class=name placeholder="KIM HANA"><br><input class=kname placeholder="김하나">
<div class=row><label>HEIGHT</label><input placeholder="172 cm"></div>
<div class=row><label>WEIGHT</label><input placeholder="50 kg"></div>
<div class=row><label>SHOES</label><input placeholder="245 mm"></div>
<div class=row><label>TEL</label><input placeholder="010 1234 1234"></div>
<div class=photos>
<div class=sub onclick="pick('p2')"><span>+ 사진선택</span><img id="i2" hidden></div><input id="p2" type=file accept=image/* hidden onchange="load(this,'i2')">
<div class=sub onclick="pick('p3')"><span>+ 사진선택</span><img id="i3" hidden></div><input id="p3" type=file accept=image/* hidden onchange="load(this,'i3')">
</div></div></div>
<script>
function pick(id){document.getElementById(id).click()}
function load(inp,imgid){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{const img=document.getElementById(imgid);img.src=e.target.result;img.hidden=false;img.previousElementSibling&& (img.previousElementSibling.style.display='none');};r.readAsDataURL(f)}
</script></body></html>
