<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>이유식 재고관리</title>

<style>

body{
    margin:0;
    padding:12px;
    background:#f5f5f5;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.add-btn{
    width:100%;
    border:none;
    border-radius:12px;
    padding:12px;
    font-size:16px;
    background:#7c6cff;
    color:white;
    margin-bottom:12px;
}

.card{
    background:white;
    border-radius:16px;
    padding:14px;
    margin-bottom:12px;
    box-shadow:0 2px 6px rgba(0,0,0,.08);
}

.top{
    display:flex;
    gap:8px;
    align-items:center;
}

.name{
    flex:1;
    font-size:20px;
    font-weight:700;
}

.weight{
    width:55px;
    text-align:center;
    font-size:20px;
    font-weight:700;
}

.g{
    font-size:18px;
    font-weight:700;
}

input{
    border:1px solid #ddd;
    border-radius:8px;
    padding:8px;
}

.date{
    margin-top:10px;
}

.dday{
    margin-top:10px;
    font-weight:700;
    display:inline-block;
    padding:5px 10px;
    border-radius:8px;
    background:#e8f5e9;
}

.warning{
    background:#fff3cd;
}

.expired{
    background:#ffd6d6;
}

.stock-grid{
    display:grid;
    grid-template-columns:repeat(10,1fr);
    gap:4px;
    margin-top:12px;
}

.stock{
    width:22px;
    height:22px;
    border-radius:50%;
    border:2px solid #777;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    font-size:12px;
}

.state0{
    background:white;
}

.state1{
    background:#666;
    border-color:#666;
}

.state2{
    background:#4caf50;
    border-color:#4caf50;
    color:white;
}

.summary{
    margin-top:10px;
    font-size:14px;
    font-weight:600;
}

.delete{
    margin-top:8px;
    border:none;
    border-radius:8px;
    background:#ff5252;
    color:white;
    padding:5px 10px;
    font-size:12px;
}

</style>
</head>

<body>

<button class="add-btn" onclick="addItem()">
+ 이유식 추가
</button>

<div id="list"></div>

<script>

let items =
JSON.parse(localStorage.getItem("babyFood")) || [];

if(items.length===0){

items.push({
name:"새 이유식",
weight:20,
date:"",
stock:Array(10).fill(0)
});

}

function save(){

localStorage.setItem(
"babyFood",
JSON.stringify(items)
);

}

function getDday(date){

if(!date) return null;

let made = new Date(date);

let expire = new Date(made);

expire.setDate(expire.getDate()+14);

let today = new Date();

today.setHours(0,0,0,0);
expire.setHours(0,0,0,0);

return Math.ceil(
(expire-today)/(10006060*24)
);

}

function render(){

const list =
document.getElementById("list");

list.innerHTML="";

items.forEach((item,index)=>{

let dday = getDday(item.date);

let dclass="";
let dtext="날짜 입력";

if(dday!==null){

if(dday<0){
dclass="expired";
dtext="만료";
}
else if(dday<=3){
dclass="warning";
dtext="D-"+dday;
}
else{
dtext="D-"+dday;
}

}

let used =
item.stock.filter(x=>x===1).length;

let done =
item.stock.filter(x=>x===2).length;

let card =
document.createElement("div");

card.className="card";

card.innerHTML= <div class="top">  <input class="name" value="${item.name}" onchange="items[${index}].name=this.value;save()" >  <input class="weight" type="number" value="${item.weight}" onchange="items[${index}].weight=this.value;save()" >  <span class="g">g</span>  </div>  <div class="date">  제조일  <input type="date" value="${item.date}" onchange="items[${index}].date=this.value;render()" >  </div>  <div class="dday ${dclass}"> ${dtext} </div>  <div class="stock-grid">  ${item.stock.map((s,i)=> <div
class="stock state${s}"
onclick="items[${index}].stock[${i}]=(items[${index}].stock[${i}]+1)%3;render()"
>${s===2?'✓':''}</div> ).join("")}  </div>  <div class="summary">  완료 ${done} &nbsp;&nbsp;|&nbsp;&nbsp; 재고 ${used}  </div>  <button class="delete" onclick=" if(confirm('삭제할까?')){ items.splice(${index},1); if(items.length===0){ items.push({ name:'새 이유식', weight:20, date:'', stock:Array(10).fill(0) }); } render(); } "> 삭제 </button> ;

list.appendChild(card);

});

save();

}

function addItem(){

items.push({
name:"새 이유식",
weight:20,
date:"",
stock:Array(10).fill(0)
});

render();

}

render();

</script>

</body>
</html>
