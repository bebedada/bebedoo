
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>식단표</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#f4f5f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:16px}
#add{width:100%;padding:14px;border:none;background:#4caf50;color:#fff;font-size:18px;border-radius:12px;font-weight:700}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:16px;margin:18px 0;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden}
.header{display:flex;align-items:center;padding:12px 14px;background:#fafafa;border-bottom:1px solid #eee;gap:8px}
.title{flex:1;text-align:center;font-size:20px;font-weight:bold}
.textbtn{border:none;background:#f0f0f0;border-radius:8px;padding:8px 12px;font-weight:600}
.picker{padding:6px 8px;text-align:center}
.icon{border:none;background:#f0f0f0;border-radius:10px;padding:8px 10px}
.today{border:2px solid #6fcf97}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th,td{border:1px solid #eee}
th{background:#f8f8f8;padding:8px}
.cell{min-height:36px;padding:8px;outline:none;text-align:center;display:flex;align-items:center;justify-content:center}
.bottom{display:flex;justify-content:space-around;padding:10px;background:#fcfcfc}
.bottom input{width:42%;padding:8px;text-align:center;border:1px solid #ddd;border-radius:8px}
.hidden{display:none}

.amountRow td{padding:8px;text-align:center;font-weight:bold}
.amountRow input{width:42%;padding:0 2px;text-align:center;border:none;background:transparent;font-size:18px}

</style>
</head>
<body>
<button id="add">+ 식단표 추가</button>
<div id="wrap"></div>
<script>
let data=JSON.parse(localStorage.getItem("meal_v2")||"[]");
const W=["일","월","화","수","목","금","토"];
const iso=()=>new Date().toISOString().slice(0,10);
const fmt=d=>{let x=new Date(d+"T00:00");return `${x.getMonth()+1}/${x.getDate()}(${W[x.getDay()]})`;};
function save(){localStorage.setItem("meal_v2",JSON.stringify(data))}
function nextDate(d){
 let t=new Date(d+"T00:00");
 while(true){
  t.setDate(t.getDate()+1);
  let s=t.toISOString().slice(0,10);
  if(!data.some(v=>v.date===s))return s;
 }
}
function blank(date){return{date,id:Date.now()+Math.random(),cells:Array(15).fill(""),eat:[["",""],["",""],["",""]]}}
function render(){
 data.sort((a,b)=>a.date.localeCompare(b.date));
 wrap.innerHTML="";
 data.forEach(card=>{
  let c=document.createElement("div");
  c.className="card"+(card.date===iso()?" today":"");
  let rows="";
  for(let r=0;r<5;r++){
    rows+="<tr>";
    for(let col=0;col<3;col++){
      let i=r*3+col;
      rows+=`<td><div class="cell" contenteditable data-i="${i}">${card.cells[i]||""}</div></td>`;
    }
    rows+="</tr>";
  }
  c.innerHTML=`<div class="header">
<input class="picker" type="date" value="${card.date}">
<div class="title">${fmt(card.date)}</div>
<button class="textbtn copy">복사</button>
<button class="textbtn del">삭제</button>
</div>
<table><tr><th>아침</th><th>점심</th><th>저녁</th></tr>${rows}<tr class="amountRow">
<td><input class="eat" data-meal="0" data-type="0" value="${card.eat[0][0]}"> / <input class="eat" data-meal="0" data-type="1" value="${card.eat[0][1]}"></td>
<td><input class="eat" data-meal="1" data-type="0" value="${card.eat[1][0]}"> / <input class="eat" data-meal="1" data-type="1" value="${card.eat[1][1]}"></td>
<td><input class="eat" data-meal="2" data-type="0" value="${card.eat[2][0]}"> / <input class="eat" data-meal="2" data-type="1" value="${card.eat[2][1]}"></td>
</tr></table>`;
  wrap.appendChild(c);
  let edits=[...c.querySelectorAll(".cell")];
  edits.forEach((e,idx)=>{
    e.oninput=()=>{card.cells[idx]=e.innerText;save();}
    e.onkeydown=(ev)=>{if(ev.key==="Enter"){ev.preventDefault();(edits[idx+1]||c.querySelectorAll("input")[1]).focus();}}
  });
  c.querySelectorAll(".eat").forEach(inp=>{
    inp.oninput=()=>{
      const meal=Number(inp.dataset.meal);
      const type=Number(inp.dataset.type);
      card.eat[meal][type]=inp.value;
      save();
    };
  });
  c.querySelector(".picker").onchange=e=>{card.date=e.target.value;c.querySelector(".title").textContent=fmt(card.date);save();render();}
  c.querySelector(".copy").onclick=()=>{let cp=JSON.parse(JSON.stringify(card));cp.id=Date.now()+Math.random();cp.date=nextDate(card.date);data.push(cp);save();render();}
  c.querySelector(".del").onclick=()=>{if(confirm("삭제하시겠습니까?")){data=data.filter(x=>x.id!==card.id);save();render();}}
 });
}
document.getElementById("add").onclick=()=>{data.push(blank(iso()));save();render();}
if(!data.length)data.push(blank(iso()));
render();
</script>
</body>
</html>
