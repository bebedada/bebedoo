<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CVAI 가이드 측정기</title>
<style>
body{font-family:sans-serif;text-align:center;background:#f5f5f5;margin:20px}
canvas{border:1px solid #ccc;max-width:100%;background:#fff;touch-action:none}
button{padding:10px 15px;margin:8px}
#result{font-size:18px;line-height:1.7;margin-top:15px}
</style>
</head>
<body>
<h2>CVAI 측정기</h2>
<p>위 → 아래 → 왼쪽 → 오른쪽 순서로 점을 찍으세요.<br>
그 후 가이드선 위에서 대각선 A/B의 양 끝점 4개를 찍으세요.</p>

<input type="file" id="imgInput" accept="image/*"><br><br>
<canvas id="cv"></canvas><br>
<button onclick="resetAll()">초기화</button>
<div id="result"></div>

<script>
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const result=document.getElementById('result');

let img=new Image();
let headPts=[]; // 위 아래 좌 우
let diagPts=[]; // 4개

document.getElementById('imgInput').onchange=e=>{
 const f=e.target.files[0];
 if(!f) return;
 const r=new FileReader();
 r.onload=ev=>{
   img.onload=()=>{
      cv.width=img.width;
      cv.height=img.height;
      headPts=[]; diagPts=[];
      draw();
   };
   img.src=ev.target.result;
 };
 r.readAsDataURL(f);
};

function pos(e){
 const r=cv.getBoundingClientRect();
 return {
  x:(e.clientX-r.left)*(cv.width/r.width),
  y:(e.clientY-r.top)*(cv.height/r.height)
 };
}

cv.addEventListener('click',e=>{
 if(!img.src) return;
 const p=pos(e);

 if(headPts.length<4){
   headPts.push(p);
 }else if(diagPts.length<4){
   diagPts.push(p);
   if(diagPts.length===4) calc();
 }
 draw();
});

function draw(){
 ctx.clearRect(0,0,cv.width,cv.height);
 if(img.src) ctx.drawImage(img,0,0);

 headPts.forEach(p=>{
   ctx.beginPath();
   ctx.arc(p.x,p.y,6,0,Math.PI*2);
   ctx.fillStyle='red';
   ctx.fill();
 });

 if(headPts.length===4){
   const top=headPts[0], bottom=headPts[1], left=headPts[2], right=headPts[3];

   const cx=(left.x+right.x)/2;
   const cy=(top.y+bottom.y)/2;

   // 정중선
   ctx.strokeStyle='orange';
   ctx.lineWidth=2;
   ctx.beginPath();
   ctx.moveTo(cx,0);
   ctx.lineTo(cx,cv.height);
   ctx.stroke();

   // ±30도 (세로 기준)
   drawGuide(cx,cy,30);
   drawGuide(cx,cy,-30);
 }

 diagPts.forEach((p,i)=>{
   ctx.beginPath();
   ctx.arc(p.x,p.y,7,0,Math.PI*2);
   ctx.fillStyle='limegreen';
   ctx.fill();

   ctx.fillStyle='black';
   ctx.fillText(i+1,p.x+8,p.y);
 });

 if(diagPts.length>=2){
   ctx.strokeStyle='blue';
   ctx.lineWidth=3;
   ctx.beginPath();
   ctx.moveTo(diagPts[0].x,diagPts[0].y);
   ctx.lineTo(diagPts[1].x,diagPts[1].y);
   ctx.stroke();
 }

 if(diagPts.length===4){
   ctx.beginPath();
   ctx.moveTo(diagPts[2].x,diagPts[2].y);
   ctx.lineTo(diagPts[3].x,diagPts[3].y);
   ctx.stroke();
 }
}

function drawGuide(cx,cy,deg){
 const rad=deg*Math.PI/180;
 const len=Math.max(cv.width,cv.height);

 const dx=Math.sin(rad)*len;
 const dy=Math.cos(rad)*len;

 ctx.strokeStyle='#888';
 ctx.lineWidth=1;

 ctx.beginPath();
 ctx.moveTo(cx-dx,cy+dy);
 ctx.lineTo(cx+dx,cy-dy);
 ctx.stroke();
}

function grade(v){
 if(v<3.5) return "정상 범위";
 if(v<6.25) return "경도 비대칭";
 if(v<8.75) return "중등도 비대칭";
 if(v<11) return "중증 비대칭";
 return "매우 중증 비대칭";
}

function calc(){
 const A=Math.hypot(diagPts[1].x-diagPts[0].x,diagPts[1].y-diagPts[0].y);
 const B=Math.hypot(diagPts[3].x-diagPts[2].x,diagPts[3].y-diagPts[2].y);

 const long=Math.max(A,B);
 const short=Math.min(A,B);

 const cvai=((long-short)/long)*100;

 result.innerHTML=`
 <b>대각선 A</b>: ${A.toFixed(0)} px<br>
 <b>대각선 B</b>: ${B.toFixed(0)} px<br><br>
 <b>CVAI</b>: ${cvai.toFixed(2)}%<br>
 <b>${grade(cvai)}</b><br><br>
 <small>참고용 결과이며 의료적 진단을 대체하지 않습니다.</small>
 `;
}

function resetAll(){
 headPts=[];
 diagPts=[];
 result.innerHTML='';
 draw();
}
</script>
</body>
</html>
