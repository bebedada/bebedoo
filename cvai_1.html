<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CVAI + CI 측정기</title>
<style>
body{font-family:sans-serif;background:#f5f5f5;text-align:center;padding:15px}
canvas{border:1px solid #ccc;max-width:100%;background:#fff;touch-action:none}
button{padding:10px 16px;margin:8px}
#result{margin-top:15px;font-size:18px;line-height:1.8}
</style>
</head>
<body>
<h2>CVAI + 단두증(CI) 측정기</h2>
<p>1~4: 위·아래·왼쪽·오른쪽<br>5~8: 대각선 A/B 양 끝점</p>
<input type="file" id="imgInput" accept="image/*"><br><br>
<canvas id="cv"></canvas><br>
<button onclick="resetAll()">초기화</button>
<div id="result"></div>

<script>
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const result=document.getElementById('result');

let img=new Image(), head=[], diag=[], drag=null;

let crop={sx:0,sy:0,sw:0,sh:0};

function setupCrop(){
 const targetRatio=1/1.2;

 if((img.width/img.height)>targetRatio){
   crop.sh=img.height;
   crop.sw=img.height*targetRatio;
   crop.sx=(img.width-crop.sw)/2;
   crop.sy=0;
 }else{
   crop.sw=img.width;
   crop.sh=img.width/targetRatio;
   crop.sx=0;
   crop.sy=(img.height-crop.sh)/2;
 }

 cv.width=Math.round(crop.sw);
 cv.height=Math.round(crop.sh);
}


document.getElementById('imgInput').onchange=e=>{
 const f=e.target.files[0]; if(!f)return;
 const r=new FileReader();
 r.onload=x=>{
  img.onload=()=>{setupCrop();head=[];diag=[];draw();result.innerHTML='';};
  img.src=x.target.result;
 };
 r.readAsDataURL(f);
};

function p(e){
 const t=e.touches?e.touches[0]:e;
 const r=cv.getBoundingClientRect();
 return {x:(t.clientX-r.left)*(cv.width/r.width),y:(t.clientY-r.top)*(cv.height/r.height)};
}

cv.addEventListener('click',e=>{
 if(drag!==null) return;
 const pt=p(e);
 if(head.length<4) head.push(pt);
 else if(diag.length<4){diag.push(pt); if(diag.length===4) calc();}
 draw();
});

function hit(pt,a){return Math.hypot(pt.x-a.x,pt.y-a.y)<30;}

function start(e){
 const pt=p(e);
 for(let i=0;i<head.length;i++) if(hit(pt,head[i])){drag={t:'h',i}; return;}
 for(let i=0;i<diag.length;i++) if(hit(pt,diag[i])){drag={t:'d',i}; return;}
}
function move(e){
 if(!drag) return;
 e.preventDefault();
 const pt=p(e);
 if(drag.t==='h') head[drag.i]=pt; else diag[drag.i]=pt;
 draw(); if(diag.length===4) calc();
}
function end(){drag=null;}

cv.addEventListener('mousedown',start);
cv.addEventListener('mousemove',move);
window.addEventListener('mouseup',end);
cv.addEventListener('touchstart',start,{passive:false});
cv.addEventListener('touchmove',move,{passive:false});
cv.addEventListener('touchend',end);

function guide(cx,cy,deg){
 const r=deg*Math.PI/180, len=Math.max(cv.width,cv.height);
 const dx=Math.sin(r)*len, dy=Math.cos(r)*len;
 ctx.save();
 ctx.setLineDash([12,8]);
 ctx.strokeStyle='#00A0FF';
 ctx.lineWidth=4;
 ctx.beginPath();
 ctx.moveTo(cx-dx,cy+dy);
 ctx.lineTo(cx+dx,cy-dy);
 ctx.stroke();
 ctx.restore();
}

function draw(){
 ctx.clearRect(0,0,cv.width,cv.height);
 if(img.src) ctx.drawImage(img,crop.sx,crop.sy,crop.sw,crop.sh,0,0,cv.width,cv.height);

 head.forEach((x,i)=>{
  ctx.beginPath();ctx.arc(x.x,x.y,9,0,Math.PI*2);
  ctx.fillStyle='red';ctx.fill();
  ctx.fillStyle='white';ctx.fillText(i+1,x.x-3,x.y+4);
 });

 if(head.length===4){
  const cx=(head[2].x+head[3].x)/2;
  const cy=(head[0].y+head[1].y)/2;

  ctx.strokeStyle='orange';
  ctx.lineWidth=5;
  ctx.beginPath();
  ctx.moveTo(cx,0); ctx.lineTo(cx,cv.height); ctx.stroke();

  guide(cx,cy,30);
  guide(cx,cy,-30);
 }

 diag.forEach((x,i)=>{
  ctx.beginPath();ctx.arc(x.x,x.y,9,0,Math.PI*2);
  ctx.fillStyle='limegreen';ctx.fill();
 });

 if(diag.length>=2){
  ctx.strokeStyle='blue';ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(diag[0].x,diag[0].y);ctx.lineTo(diag[1].x,diag[1].y);ctx.stroke();
 }
 if(diag.length===4){
  ctx.beginPath();ctx.moveTo(diag[2].x,diag[2].y);ctx.lineTo(diag[3].x,diag[3].y);ctx.stroke();
 }
}

function ciGrade(ci){
 if(ci<=90) return "정상 범위";
 if(ci<=92) return "자세교정 가능";
 if(ci<=94) return "자세교정 어려움";
 if(ci<=96) return "자세교정 불가";
 if(ci<=99) return "심한 변형";
 return "극심한 변형";
}

function cvaiGrade(v){
 if(v<3.5) return "정상 범위";
 if(v<6.25) return "경도 비대칭";
 if(v<8.75) return "중등도 비대칭";
 if(v<11) return "중증 비대칭";
 return "매우 중증 비대칭";
}

function calc(){
 const A=Math.hypot(diag[1].x-diag[0].x,diag[1].y-diag[0].y);
 const B=Math.hypot(diag[3].x-diag[2].x,diag[3].y-diag[2].y);
 const cvai=((Math.max(A,B)-Math.min(A,B))/Math.max(A,B))*100;

 const width=Math.hypot(head[3].x-head[2].x,head[3].y-head[2].y);
 const height=Math.hypot(head[1].x-head[0].x,head[1].y-head[0].y);
 const ci=(width/height)*100;

 result.innerHTML=`
 <b>CVAI</b> ${cvai.toFixed(2)}%<br>
 ${cvaiGrade(cvai)}<br><br>
 <b>CI</b> ${ci.toFixed(1)}<br>
 ${ciGrade(ci)}<br><br>
 <small>참고용 결과이며 의료적 진단을 대체하지 않습니다.</small>`;
}

function resetAll(){head=[];diag=[];result.innerHTML='';draw();}
</script>
</body>
</html>
