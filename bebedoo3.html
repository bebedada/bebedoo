<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CVAI Auto</title>
<style>
body{font-family:sans-serif;margin:20px;text-align:center;background:#f5f5f5}
canvas{border:1px solid #ccc;max-width:100%;touch-action:none;background:#fff}
button{padding:10px 16px;margin:8px}
#result{font-size:18px;line-height:1.8;margin-top:15px}
</style>
</head>
<body>
<h2>CVAI 자동 측정기 (초안)</h2>
<p>위 → 아래 → 왼쪽 → 오른쪽 순서로 점을 찍어주세요.</p>
<input type="file" id="imageInput" accept="image/*"><br><br>
<canvas id="canvas"></canvas><br>
<button onclick="resetAll()">초기화</button>
<div id="result"></div>
<p style="font-size:13px;color:#666">참고용 도구이며 의료적 진단을 대체하지 않습니다.</p>

<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const result=document.getElementById('result');
let img=new Image();
let base=[];
let autoPts=[];
let drag=-1;

document.getElementById('imageInput').onchange=e=>{
 const f=e.target.files[0]; if(!f) return;
 const r=new FileReader();
 r.onload=ev=>{
  img.onload=()=>{
   canvas.width=img.width; canvas.height=img.height;
   base=[]; autoPts=[]; draw();
  };
  img.src=ev.target.result;
 };
 r.readAsDataURL(f);
};

canvas.onclick=e=>{
 if(base.length>=4) return;
 const p=pos(e);
 base.push(p);
 if(base.length===4) buildAuto();
 draw();
};

function pos(e){
 const r=canvas.getBoundingClientRect();
 return {
  x:(e.clientX-r.left)*(canvas.width/r.width),
  y:(e.clientY-r.top)*(canvas.height/r.height)
 };
}

function buildAuto(){
 const top=base[0], bottom=base[1], left=base[2], right=base[3];
 const cx=(left.x+right.x)/2;
 const cy=(top.y+bottom.y)/2;
 const rx=Math.abs(right.x-left.x)/2;
 const ry=Math.abs(bottom.y-top.y)/2;

 function ellipsePoint(a){
   const rad=a*Math.PI/180;
   return {x:cx+rx*Math.cos(rad), y:cy+ry*Math.sin(rad)};
 }
 autoPts=[ellipsePoint(-30),ellipsePoint(150),ellipsePoint(30),ellipsePoint(210)];
 calc();
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 if(img.src) ctx.drawImage(img,0,0);

 base.forEach(p=>{
   ctx.beginPath();ctx.arc(p.x,p.y,7,0,Math.PI*2);
   ctx.fillStyle="red";ctx.fill();
 });

 if(autoPts.length===4){
   ctx.beginPath();
   ctx.moveTo(autoPts[0].x,autoPts[0].y);
   ctx.lineTo(autoPts[1].x,autoPts[1].y);
   ctx.strokeStyle="blue";ctx.lineWidth=3;ctx.stroke();

   ctx.beginPath();
   ctx.moveTo(autoPts[2].x,autoPts[2].y);
   ctx.lineTo(autoPts[3].x,autoPts[3].y);
   ctx.stroke();

   autoPts.forEach(p=>{
      ctx.beginPath();ctx.arc(p.x,p.y,8,0,Math.PI*2);
      ctx.fillStyle="limegreen";ctx.fill();
   });
 }
}

canvas.addEventListener('mousedown',e=>{
 if(autoPts.length!==4) return;
 const p=pos(e);
 autoPts.forEach((pt,i)=>{
   if(Math.hypot(pt.x-p.x,pt.y-p.y)<15) drag=i;
 });
});

canvas.addEventListener('mousemove',e=>{
 if(drag<0) return;
 autoPts[drag]=pos(e);
 draw(); calc();
});

window.addEventListener('mouseup',()=>drag=-1);

function calc(){
 const A=Math.hypot(autoPts[1].x-autoPts[0].x,autoPts[1].y-autoPts[0].y);
 const B=Math.hypot(autoPts[3].x-autoPts[2].x,autoPts[3].y-autoPts[2].y);
 const L=Math.max(A,B), S=Math.min(A,B);
 const cvai=((L-S)/L)*100;

 let g="정상 범위";
 if(cvai>=11) g="매우 중증 비대칭";
 else if(cvai>=8.75) g="중증 비대칭";
 else if(cvai>=6.25) g="중등도 비대칭";
 else if(cvai>=3.5) g="경도 비대칭";

 result.innerHTML=`CVAI: <b>${cvai.toFixed(2)}%</b><br>${g}`;
}

function resetAll(){base=[];autoPts=[];result.innerHTML="";draw();}
</script>
</body>
</html>
